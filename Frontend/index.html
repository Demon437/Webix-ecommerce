<!doctype html>
<html lang="en">

<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title (VERY IMPORTANT for SEO) -->
  <title>Buy Trending Products Online | Best Deals & Discounts | Base44 Store</title>

  <!-- SEO Meta -->
  <meta name="description"
    content="Shop trending products online at Base44 Store. Get best deals on electronics, fashion, and more. Fast delivery, secure payment & easy returns." />

  <meta name="keywords"
    content="online shopping, buy products online, ecommerce store India, best deals, electronics, fashion, Base44 store" />

  <meta name="author" content="Base44 Store" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Manifest (PWA support) -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph (Social Media SEO) -->
  <meta property="og:title" content="Base44 Store | Best Online Shopping Deals" />
  <meta property="og:description"
    content="Explore amazing deals on trending products. Fast delivery & secure checkout." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://ecommerce.webixinfotech.in/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Base44 Store | Online Shopping Made Easy" />
  <meta name="twitter:description"
    content="Buy top-quality products at unbeatable prices. Shop now!" />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Theme Color (Mobile Browser UI) -->
  <meta name="theme-color" content="#000000" />

</head>

  <div id="root"></div>

  <!-- React App -->
  <script type="module" src="/src/main.jsx"></script>

</html>
